# ContractGuard — Prometheus Configuration
# Metrics: API latency, LLM call success rate, review queue depth

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "contractguard-api"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["api:8000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
