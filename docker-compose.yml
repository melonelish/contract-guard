# ═══════════════════════════════════════════════════════
# ContractGuard — Docker Compose (Development)
# ═══════════════════════════════════════════════════════
# Start all services: docker compose up -d
# Stop all services:  docker compose down
# ═══════════════════════════════════════════════════════

services:
  # ── API Server ──
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: contractguard-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://contractguard:changeme@postgres:5432/contractguard
      DATABASE_SYNC_URL: postgresql://contractguard:changeme@postgres:5432/contractguard
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Dev Server) ──
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: contractguard-frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── PostgreSQL ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contractguard-postgres
    environment:
      POSTGRES_USER: contractguard
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: contractguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contractguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (消息队列 + 缓存，开发环境单节点) ──
  # 生产升级：Redis Sentinel 主从切换 + 分离消息队列(NATS)与缓存
  redis:
    image: redis:7-alpine
    container_name: contractguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch ──
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: contractguard-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Milvus (Vector DB) ──
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: contractguard-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 20s
      timeout: 10s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: contractguard-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── MinIO (File Storage) ──
  minio:
    image: minio/minio:latest
    container_name: contractguard-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus (Metrics) ──
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: contractguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Grafana (Dashboards) ──
  grafana:
    image: grafana/grafana:10.4.0
    container_name: contractguard-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── API Gateway (Phase 2) ──
  # MVP 阶段使用 FastAPI 中间件(CORSMiddleware + RateLimitMiddleware)替代 Kong
  # Kong 在 Phase 2 引入，负责: 认证/限流/路由/日志
  # kong:
  #   image: kong:3.6
  #   ...

  # ── Vault (Secret Management) ──
  vault:
    image: vault:1.15
    container_name: contractguard-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token-change-me
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8200/v1/sys/health"]
      interval: 20s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  es_data:
  milvus_data:
  etcd_data:
  minio_data:
  prometheus_data:
  grafana_data:
