version: "3.9"

# ═══════════════════════════════════════════════════════
# ContractGuard — Docker Compose (Development)
# ═══════════════════════════════════════════════════════
# Start all services: docker compose up -d
# Stop all services:  docker compose down
# ═══════════════════════════════════════════════════════

services:
  # ── API Server ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contractguard-api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Dev Server) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: contractguard-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

  # ── PostgreSQL ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contractguard-postgres
    environment:
      POSTGRES_USER: contractguard
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: contractguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contractguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: contractguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch ──
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: contractguard-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Milvus (Vector DB) ──
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: contractguard-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: contractguard-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  # ── MinIO (File Storage) ──
  minio:
    image: minio/minio:latest
    container_name: contractguard-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Vault (Secret Management) ──
  vault:
    image: vault:1.15
    container_name: contractguard-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token-change-me
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev

volumes:
  postgres_data:
  redis_data:
  es_data:
  milvus_data:
  etcd_data:
  minio_data:
